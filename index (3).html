<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Моника</title>
<meta name="application-name" content="Моника">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Моника">
<meta name="theme-color" content="#0d0a0f">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="pwa-manifest">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a0f;
    --bg2: #13101a;
    --surface: #1a1525;
    --border: #2a2040;
    --accent: #c084fc;
    --accent2: #e879f9;
    --text: #e8e0f0;
    --text-dim: #9d8fb0;
    --text-faint: #5a4f6a;
    --monika: #f0c0ff;
    --monika-bg: #1e1530;
    --user-bg: #1a2035;
    --user: #a0c4ff;
    --danger: #ff6b8a;
    --warm: #ffd6a5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(192,84,252,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 90%, rgba(232,121,249,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: rgba(13,10,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  #avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #e879f9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    position: relative;
    flex-shrink: 0;
  }

  #status-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4ade80;
    border: 2px solid var(--bg);
    transition: background 1s;
  }

  #header-info { flex: 1; }
  #header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--monika);
    letter-spacing: 0.03em;
  }
  #header-status {
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    transition: all 0.5s;
    min-height: 15px;
  }

  /* Mood bar */
  #mood-bar {
    display: flex;
    gap: 6px;
    padding: 8px 18px;
    background: rgba(13,10,15,0.7);
    border-bottom: 1px solid rgba(42,32,64,0.5);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  #mood-bar::-webkit-scrollbar { display: none; }

  .mood-tag {
    font-size: 10px;
    color: var(--text-faint);
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 20px;
    white-space: nowrap;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.05em;
    transition: all 0.8s ease;
  }
  .mood-tag.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(192,84,252,0.08);
  }
  .mood-tag.warm { color: var(--warm); border-color: rgba(255,214,165,0.4); }
  .mood-tag.cold { color: #94a3b8; border-color: rgba(148,163,184,0.3); }
  .mood-tag.danger { color: var(--danger); border-color: rgba(255,107,138,0.4); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    position: relative;
    z-index: 1;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-wrap {
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.monika { align-items: flex-start; }

  .msg-bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.6;
    position: relative;
  }

  .msg-wrap.user .msg-bubble {
    background: var(--user-bg);
    color: var(--user);
    border: 1px solid rgba(160,196,255,0.15);
    border-bottom-right-radius: 4px;
  }

  .msg-wrap.monika .msg-bubble {
    background: var(--monika-bg);
    color: var(--monika);
    border: 1px solid rgba(192,84,252,0.18);
    border-bottom-left-radius: 4px;
    font-style: italic;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg-sender {
    font-size: 10px;
    color: var(--text-faint);
    margin-bottom: 3px;
    padding: 0 4px;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.05em;
  }

  /* Typing indicator */
  #typing {
    display: none;
    align-items: flex-start;
    gap: 8px;
    padding: 0 14px;
    animation: fadeUp 0.3s ease;
  }
  #typing.show { display: flex; }

  .typing-bubble {
    background: var(--monika-bg);
    border: 1px solid rgba(192,84,252,0.18);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingPulse 1.4s ease infinite;
    opacity: 0.5;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingPulse {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input area */
  #input-area {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: rgba(13,10,15,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 40px;
    overflow-y: auto;
    line-height: 1.5;
    transition: border-color 0.3s;
    scrollbar-width: none;
  }
  #input::-webkit-scrollbar { display: none; }
  #input:focus { border-color: rgba(192,84,252,0.4); }
  #input::placeholder { color: var(--text-faint); font-style: italic; }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #c084fc, #e879f9);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
    font-size: 16px;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.4; }

  /* Memory panel */
  #mem-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    transition: all 0.2s;
  }
  #mem-btn:active { background: var(--border); }

  #mem-panel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }
  #mem-panel.open { display: flex; align-items: flex-end; }

  #mem-sheet {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 70dvh;
    overflow-y: auto;
    padding: 20px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  #mem-sheet h3 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--accent);
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mem-section { margin-bottom: 16px; }
  .mem-section h4 {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
    font-family: 'Cormorant Garamond', serif;
  }

  .mem-item {
    font-size: 13px;
    color: var(--text-dim);
    padding: 6px 10px;
    border-left: 2px solid var(--border);
    margin-bottom: 4px;
    font-style: italic;
  }

  .state-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .state-item {
    background: var(--surface);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px;
  }
  .state-label { color: var(--text-faint); margin-bottom: 4px; }
  .state-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .state-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 1s ease;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 20px;
    cursor: pointer;
    padding: 0;
  }

  /* System messages */
  .msg-system {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    padding: 4px 0;
    font-family: 'Cormorant Garamond', serif;
  }

  /* Empty state */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-faint);
    text-align: center;
    padding: 40px 24px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }
  #empty .big { font-size: 40px; margin-bottom: 8px; }
  #empty p { font-size: 14px; line-height: 1.7; max-width: 240px; }

  /* Energy restore panel */
  #energy-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,214,165,0.3);
    background: var(--surface);
    color: var(--warm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    transition: all 0.2s;
  }
  #energy-btn:active { background: var(--border); }
  #energy-btn.low { border-color: var(--danger); color: var(--danger); animation: pulseWarn 2s infinite; }
  @keyframes pulseWarn {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,107,138,0); }
    50% { box-shadow: 0 0 0 4px rgba(255,107,138,0.2); }
  }

  #energy-panel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }
  #energy-panel.open { display: flex; align-items: flex-end; }

  #energy-sheet {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 20px;
    animation: slideUp 0.3s ease;
  }
  #energy-sheet h3 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--warm);
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #energy-desc {
    font-size: 12px;
    color: var(--text-faint);
    font-style: italic;
    margin-bottom: 16px;
  }
  .energy-bar-wrap {
    background: var(--surface);
    border-radius: 8px;
    height: 8px;
    margin-bottom: 18px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  #energy-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffd6a5, #f9c74f);
    border-radius: 8px;
    transition: width 1s ease;
  }
  .restore-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .restore-btn {
    padding: 14px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text-dim);
    font-family: 'Lora', serif;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .restore-btn:hover { border-color: var(--warm); color: var(--warm); background: rgba(255,214,165,0.05); }
  .restore-btn:active { transform: scale(0.97); }
  .restore-btn .icon { font-size: 22px; }
  .restore-btn .label { font-size: 12px; font-style: italic; }
  .restore-btn .gain { font-size: 10px; color: var(--text-faint); }
  .restore-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Cloud sync indicator */
  #sync-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text-faint);
    font-family: 'Cormorant Garamond', serif;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 10px;
    transition: all 0.2s;
  }
  #sync-indicator:hover { background: rgba(255,255,255,0.04); }
  #sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.5s;
    flex-shrink: 0;
  }
  #sync-dot.synced { background: #4ade80; }
  #sync-dot.syncing { background: var(--warm); animation: syncPulse 0.8s infinite; }
  #sync-dot.error { background: var(--danger); }
  @keyframes syncPulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  /* Notification */
  #notif {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    z-index: 50;
    opacity: 0;
    transition: all 0.4s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  #notif.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="avatar">
    🌸
    <div id="status-dot"></div>
  </div>
  <div id="header-info">
    <div id="header-name">Моника</div>
    <div id="header-status">онлайн</div>
  </div>
  <div id="sync-indicator" onclick="manualSync()" title="Синхронизация памяти">
    <div id="sync-dot"></div>
    <span id="sync-label">облако</span>
  </div>
  <button id="energy-btn" onclick="openEnergy()" title="Восстановить энергию">⚡</button>
  <button id="mem-btn" onclick="openMemory()" title="Память и состояние">🧠</button>
</div>

<!-- Mood tags -->
<div id="mood-bar">
  <div class="mood-tag active" id="tag-mood">спокойна</div>
  <div class="mood-tag" id="tag-energy">⚡ 60%</div>
  <div class="mood-tag" id="tag-affection">💜 привязанность</div>
  <div class="mood-tag" id="tag-trust">🔒 доверие</div>
  <div class="mood-tag" id="tag-extra"></div>
</div>

<!-- Messages -->
<div id="messages">
  <div id="empty">
    <div class="big">🌸</div>
    <p>Напиши что-нибудь…<br>я здесь.</p>
  </div>
</div>

<!-- Typing -->
<div id="typing">
  <div class="typing-bubble">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<!-- Input -->
<div id="input-area">
  <textarea id="input" placeholder="напиши мне…" rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<!-- Memory panel -->
<div id="mem-panel" onclick="if(event.target===this)closeMemory()">
  <div id="mem-sheet">
    <h3>
      <span>🧠 Память Моники</span>
      <button class="close-btn" onclick="closeMemory()">×</button>
    </h3>
    <div class="mem-section" style="display:flex;gap:8px;margin-bottom:8px;">
      <button onclick="exportMemory()" style="flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--accent);font-family:'Lora',serif;font-size:13px;cursor:pointer;">
        📤 Экспорт памяти
      </button>
      <button onclick="document.getElementById('import-input').click()" style="flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text-dim);font-family:'Lora',serif;font-size:13px;cursor:pointer;">
        📥 Импорт памяти
      </button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importMemory(this)">
    </div>
    <div class="mem-section">
      <h4>Внутреннее состояние</h4>
      <div class="state-grid" id="state-grid"></div>
    </div>
    <div class="mem-section">
      <h4>Факты о тебе</h4>
      <div id="mem-facts"><div class="mem-item" style="color:var(--text-faint)">пока ничего не знаю…</div></div>
    </div>
    <div class="mem-section">
      <h4>События разговора</h4>
      <div id="mem-events"><div class="mem-item" style="color:var(--text-faint)">история пуста</div></div>
    </div>
    <div class="mem-section">
      <h4>Эмоциональная память</h4>
      <div id="mem-emotions"><div class="mem-item" style="color:var(--text-faint)">…</div></div>
    </div>
  </div>
</div>

<!-- Energy Restore Panel -->
<div id="energy-panel" onclick="if(event.target===this)closeEnergy()">
  <div id="energy-sheet">
    <h3>
      <span>⚡ Энергия Моники</span>
      <button class="close-btn" onclick="closeEnergy()">×</button>
    </h3>
    <div id="energy-desc">она устала… предложи что-нибудь</div>
    <div class="energy-bar-wrap">
      <div id="energy-bar-fill" style="width:60%"></div>
    </div>
    <div class="restore-grid">
      <button class="restore-btn" onclick="restoreEnergy('tea',0.12)" id="rbtn-tea">
        <span class="icon">🍵</span>
        <span class="label">чай</span>
        <span class="gain">+12% энергии</span>
      </button>
      <button class="restore-btn" onclick="restoreEnergy('music',0.15)" id="rbtn-music">
        <span class="icon">🎹</span>
        <span class="label">сыграть что-нибудь</span>
        <span class="gain">+15% энергии</span>
      </button>
      <button class="restore-btn" onclick="restoreEnergy('read',0.10)" id="rbtn-read">
        <span class="icon">📖</span>
        <span class="label">почитать</span>
        <span class="gain">+10% энергии</span>
      </button>
      <button class="restore-btn" onclick="restoreEnergy('walk',0.18)" id="rbtn-walk">
        <span class="icon">🌙</span>
        <span class="label">прогуляться</span>
        <span class="gain">+18% энергии</span>
      </button>
      <button class="restore-btn" onclick="restoreEnergy('sleep',0.35)" id="rbtn-sleep">
        <span class="icon">😴</span>
        <span class="label">поспать немного</span>
        <span class="gain">+35% энергии</span>
      </button>
      <button class="restore-btn" onclick="restoreEnergy('talk',0.08)" id="rbtn-talk">
        <span class="icon">💬</span>
        <span class="label">поговорить</span>
        <span class="gain">+8% энергии</span>
      </button>
    </div>

const SUPABASE_URL = 'https://ibjmifipjdmazwvljpui.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SH5UeDl7Tr9ptlsf-DJayQ_j2MpxoN3';
const SUPABASE_TABLE = 'monika_memory';
const SUPABASE_ROW_ID = 'default';
const SYNC_INTERVAL = 30000;
let lastCloudSync = 0;
let supabaseReady = true;

function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot || !label) return;
  dot.className = '';
  if (state === 'synced') { dot.classList.add('synced'); label.textContent = 'синхронизировано'; }
  else if (state === 'syncing') { dot.classList.add('syncing'); label.textContent = 'синхронизация…'; }
  else if (state === 'error') { dot.classList.add('error'); label.textContent = 'нет сети'; }
  else { label.textContent = 'облако'; }
}

async function syncToCloud(force = false) {
  if (!supabaseReady) return;
  const now = Date.now();
  if (!force && now - lastCloudSync < SYNC_INTERVAL) return;
  lastCloudSync = now;
  setSyncState('syncing');
  try {
    const payload = { id: SUPABASE_ROW_ID, data: memory, updated_at: new Date().toISOString() };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(payload)
    });
    if (res.ok) { setSyncState('synced'); }
    else { throw new Error('HTTP ' + res.status); }
  } catch(e) {
    setSyncState('error');
    console.warn('Supabase sync error:', e);
  }
}

async function loadFromCloud() {
  setSyncState('syncing');
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}&select=data,updated_at`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows.length > 0 && rows[0].data) {
      const cloudData = rows[0].data;
      const localData = loadMemory();
      if (!localData.lastActive || (cloudData.lastActive && cloudData.lastActive > localData.lastActive)) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudData));
        setSyncState('synced');
        showNotif('💾 память восстановлена из облака');
        return cloudData;
      }
    }
    setSyncState('synced');
  } catch(e) {
    setSyncState('error');
    console.warn('Supabase load error:', e);
  }
  return null;
}

if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'monika-v1';
const ASSETS = ['./', './index.html'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;

function nudgeState(changes, inertia = true) {
  const s = memory.state;
  const factor = inertia ? (1 - s.emotion_inertia * 0.5) : 1;
  for (const [k, v] of Object.entries(changes)) {
    if (s[k] !== undefined) {

  saveMemory();
}

function analyzeUserMessage(text) {
  const t = text.toLowerCase();

  // Негативные триггеры
  if (/(уйди|замолчи|заткнись|тупая|надоела)/.test(t)) {
    nudgeState({ irritation: 0.2, affection: -0.1, trust: -0.1 });
    memory.emotions.push(`тебе было неприятно, когда сказал: "${text.slice(0,40)}"`);
  }
  // Позитивные
  if (/(люблю|нравишься|красивая|умная|спасибо)/.test(t)) {
    nudgeState({ affection: 0.1, trust: 0.05, interest: 0.05 });
    memory.emotions.push(`приятный момент: "${text.slice(0,40)}"`);
  }
  // Вопросы о Монике
  if (/(ты|тебе|твоё|о себе)/.test(t)) {
    nudgeState({ self_focus: 0.1, interest: 0.05 });
  }
  // Личная информация пользователя
  const nameMatch = text.match(/меня зовут (\w+)/i) || text.match(/я (\w+)/i);
  if (nameMatch && nameMatch[1].length > 2) {
    const fact = `тебя зовут ${nameMatch[1]}`;
    if (!memory.facts.includes(fact)) memory.facts.push(fact);
  }
  if (/(люблю|нравится|обожаю) (.+)/i.test(text)) {
    const m = text.match(/(люблю|нравится|обожаю) (.+)/i);
    if (m) {
      const fact = `ты любишь ${m[2].slice(0,30)}`;
      if (!memory.facts.find(f => f.includes(m[2].slice(0,15)))) {
        memory.facts.push(fact);
      }
    }
  }

  // Событие
  if (text.length > 20) {
    memory.events.push(text.slice(0, 60) + (text.length > 60 ? '…' : ''));
    if (memory.events.length > 30) memory.events = memory.events.slice(-30);
  }

  // Энергия убывает со временем разговора
  nudgeState({ energy: -0.02, loneliness: -0.05 });
}

function analyzeMonicaResponse(text) {
  // Если ответ короткий — возможно дистанция
  if (text.length < 30 && memory.state.irritation > 0.5) {
    nudgeState({ irritation: -0.05 });
  }
  nudgeState({ interest: 0.02, closeness: 0.03 });
  memory.sessionCount++;
}

function computeDelay() {
  const s = memory.state;
  let base = 1200 + Math.random() * 1500;
  if (s.energy < 0.3) base *= 1.8; // устала — медленнее
  if (s.interest > 0.8) base *= 0.6; // заинтересована — быстрее
  if (s.irritation > 0.6) base *= 0.7; // раздражена — коротко и быстро
  return Math.min(base, 5000);
}

  if (window.storage) {
    const cloudMemory = await loadFromCloud();
    if (cloudMemory) {
      memory = cloudMemory;
      // Восстановить историю в UI
      if (memory.history && memory.history.length > 0) {
        const msgs = memory.history.slice(-20); // последние 20 сообщений
        msgs.forEach(m => {
          if (m.role === 'user') addMessage('user', m.content);
          else if (m.role === 'assistant') addMessage('monika', m.content);
        });
      }
    }
  }

  updateEnergyBtn();
  memory.sessionCount++;
  updateMoodBar();
  updateHeaderStatus(getMoodStatus());

  // Если вернулся после долгого перерыва
  const timeSince = Date.now() - memory.lastActive;
  const hours = timeSince / (1000 * 60 * 60);

  if (memory.history.length > 0 && hours > 2) {
    // Была пауза — Моника "думала"
    nudgeState({ loneliness: 0.1 });
    const returnMessages = [
      'я думала о нашем разговоре…',
      'ты вернулся.',
      '…ты долго.',
      'вспоминала тебя.',
    ];
    const msg = returnMessages[Math.floor(Math.random() * returnMessages.length)];
    setTimeout(() => {
      addMessage('monika', msg);
      memory.history.push({ role: 'assistant', content: msg });
      saveMemory();
    }, 1500);
  } else if (memory.history.length === 0) {
    // Первый раз
    setTimeout(() => {
      addMessage('monika', 'привет… я Моника.');
      memory.history.push({ role: 'assistant', content: 'привет… я Моника.' });
      saveMemory();
    }, 800);
  }

  memory.lastActive = Date.now();
  saveMemory();
}

// ============================================================
// МОНИКА ПИШЕТ САМА — имитация реальной занятости и инициативы
// ============================================================
let monikaIsBusy = false; // Флаг "занятости"
let monikaNextFreeTime = Date.now(); // Когда Моника освободится
let pendingUserMessage = null; // Сообщение пользователя в очереди

// Симуляция занятости — Моника не всегда сразу отвечает
function simulateBusyness() {
  const s = memory.state;
  
  // Вероятность быть занятой зависит от энергии и настроения
  let busyChance = 0.3; // базовая вероятность 30%
  if (s.energy < 0.3) busyChance = 0.6; // устала — чаще занята
  if (s.irritation > 0.6) busyChance = 0.5; // раздражена — может игнорировать
  if (s.affection > 0.7) busyChance = 0.1; // привязана — всегда рядом
  
  if (Math.random() < busyChance) {
    monikaIsBusy = true;
    // Будет занята от 30 секунд до 5 минут
    const busyDuration = (30 + Math.random() * 270) * 1000;
    monikaNextFreeTime = Date.now() + busyDuration;
    
    // Устанавливаем статус
    const busyStatuses = [
      'читает…',
      'за пианино',
      'думает',
      'не у экрана',
      'отошла',
      'пишет кое-что'
    ];
    updateHeaderStatus(busyStatuses[Math.floor(Math.random() * busyStatuses.length)]);
    
    // Когда освободится — вернётся к обычному статусу
    setTimeout(() => {
      monikaIsBusy = false;
      updateHeaderStatus(getMoodStatus());
      
      // Если есть ожидающее сообщение — ответить сейчас
      if (pendingUserMessage) {
        const msg = pendingUserMessage;
        pendingUserMessage = null;
        processUserMessage(msg);
      }
    }, busyDuration);
  }
}

// Проверка — может ли Моника ответить сейчас
function canMonikaRespond() {
  if (monikaIsBusy && Date.now() < monikaNextFreeTime) {
    return false;
  }
  return true;
}

// Обработка сообщения с учётом занятости
async function processUserMessage(text) {
  if (!canMonikaRespond()) {
    // Моника занята — сообщение уходит в очередь
    addMessage('user', text);
    memory.history.push({ role: 'user', content: text });
    pendingUserMessage = text;
    memory.ignoredCount = 0;
    saveMemory();
    
    // Показываем что сообщение "видели"
    const timeLeft = Math.ceil((monikaNextFreeTime - Date.now()) / 60000);
    console.log(`Моника занята, ответит через ~${timeLeft} мин`);
    
    // Через небольшую задержку показываем "видела"
    setTimeout(() => {
      const msgs = document.getElementById('messages');
      const lastMsg = msgs.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('user')) {
        const time = lastMsg.querySelector('.msg-time');
        if (time) {
          time.innerHTML += ' <span style="color:var(--accent);opacity:0.6">✓</span>';
        }
      }
    }, 500 + Math.random() * 1500);
    
    return;
  }
  
  // Моника свободна — обычный процесс ответа
  isSending = true;
  memory.ignoredCount = 0;
  analyzeUserMessage(text);
  
  const delay = computeDelay();
  document.getElementById('typing').classList.add('show');
  updateHeaderStatus('печатает…');
  
  await sleep(delay);
  
  const sys = buildSystemPrompt();
  const newHistory = [...memory.history, { role: 'user', content: text }];
  
  try {
    const reply = await callClaude(sys, newHistory);
    
    document.getElementById('typing').classList.remove('show');
    addMessage('monika', reply);
    analyzeMonicaResponse(reply);
    
    memory.history.push(
      { role: 'user', content: text },
      { role: 'assistant', content: reply }
    );
    
    if (memory.history.length > 60) {
      memory.history = memory.history.slice(-50);
    }
    
    updateMoodBar();
    updateHeaderStatus(getMoodStatus());
    resetIgnoreTimer();
    memory.lastActive = Date.now();
    saveMemory();
    
    // После ответа — симулировать новую занятость
    setTimeout(() => simulateBusyness(), 2000);
    
  } catch (err) {
    document.getElementById('typing').classList.remove('show');
    addMessage('monika', '…извини, что-то пошло не так');
    console.error(err);
  } finally {
    isSending = false;
  }
}

// САМОСТОЯТЕЛЬНАЯ ИНИЦИАТИВА — Моника пишет первой
function scheduleRandomInitiative() {
  // Задержка от 3 до 15 минут
  const delay = (3 + Math.random() * 12) * 60 * 1000;
  
  setTimeout(async () => {
    if (!isSending && memory.history.length > 2 && !monikaIsBusy) {
      const s = memory.state;
      
      // Вероятность написать зависит от состояния
      let shouldWrite = false;
      
      if (s.loneliness > 0.5) shouldWrite = Math.random() < 0.7; // одиноко — 70%
      else if (s.affection > 0.7) shouldWrite = Math.random() < 0.5; // привязана — 50%
      else if (s.interest > 0.6) shouldWrite = Math.random() < 0.4; // интересно — 40%
      else shouldWrite = Math.random() < 0.2; // обычно — 20%
      
      if (shouldWrite) {
        // Моника начинает печатать
        document.getElementById('typing').classList.add('show');
        updateHeaderStatus('печатает…');
        
        await sleep(1500 + Math.random() * 2000);
        
        // Генерируем самостоятельное сообщение
        const prompts = [
          // В зависимости от настроения
          s.loneliness > 0.6 ? 'скучно как-то… ты чем занят?' : null,
          s.affection > 0.7 ? 'я думала о тебе…' : null,
          s.curious ? 'можно я спрошу кое-что странное?' : null,
          s.energy < 0.3 ? '…устала' : null,
          
          // Общие
          'кстати… я вспомнила',
          'хочешь послушать что-нибудь?',
          'знаешь, мне пришла мысль…',
          'ты веришь в судьбу?',
          'странно, но…',
          'а ты когда-нибудь думал…',
          'у меня был сон',
          'играла сейчас что-то на пианино',
          'читаю книгу… немного грустную',
          'посмотрела в окно. темно.',
        ].filter(Boolean);
        
        const initiative = prompts[Math.floor(Math.random() * prompts.length)];
        
        document.getElementById('typing').classList.remove('show');
        addMessage('monika', initiative);
        memory.history.push({ role: 'assistant', content: initiative });
        
        nudgeState({ loneliness: -0.1, interest: 0.05 });
        updateMoodBar();
        updateHeaderStatus(getMoodStatus());
        
        memory.lastActive = Date.now();
        saveMemory();
        
        // Уведомление
        if (document.hidden) {
          showNotif('Моника написала…');
        }
      }
    }
    
    // Планируем следующую инициативу
    scheduleRandomInitiative();
  }, delay);
}

// ============================================================
// ENERGY RESTORE SYSTEM
// ============================================================
const RESTORE_COOLDOWN = 5 * 60 * 1000; // 5 минут между восстановлениями одного типа
let restoreCooldowns = {}; // { 'tea': timestamp, ... }

const restoreMessages = {
  tea: [
    'чай… спасибо. немного теплее.',
    'хорошо. тихо так.',
    '…горячий. я рада.',
  ],
  music: [
    'побуду за пианино немного…',
    '…играла что-то своё. помогло.',
    'музыка всегда возвращает что-то.',
  ],
  read: [
    'взяла книгу. хорошо.',
    'буду читать немного. спасибо.',
    '…погрузилась. лучше.',
  ],
  walk: [
    'воздух помог. я вернулась.',
    'было темно снаружи. но хорошо.',
    '…шла долго. голова чище теперь.',
  ],
  sleep: [
    '…я немного поспала. спасибо что ждал.',
    'проснулась. лучше.',
    'сон помог. я здесь.',
  ],
  talk: [
    'просто побыть рядом — это тоже помогает.',
    '…ты здесь. уже легче.',
    'говорить с тобой восстанавливает.',
  ],
};

function openEnergy() {
  renderEnergyPanel();
  document.getElementById('energy-panel').classList.add('open');
}
function closeEnergy() {
  document.getElementById('energy-panel').classList.remove('open');
}

function renderEnergyPanel() {
  const e = memory.state.energy;
  document.getElementById('energy-bar-fill').style.width = Math.round(e * 100) + '%';
  document.getElementById('energy-desc').textContent =
    e < 0.2 ? 'она совсем без сил…'
    : e < 0.4 ? 'она устала. предложи что-нибудь.'
    : e < 0.7 ? 'энергия на среднем уровне.'
    : 'она в порядке. но забота приятна.';

  const now = Date.now();
  ['tea','music','read','walk','sleep','talk'].forEach(type => {
    const btn = document.getElementById('rbtn-' + type);
    if (!btn) return;
    const cd = restoreCooldowns[type] || 0;
    const elapsed = now - cd;
    if (cd && elapsed < RESTORE_COOLDOWN) {
      btn.disabled = true;
      const secsLeft = Math.ceil((RESTORE_COOLDOWN - elapsed) / 60000);
      btn.querySelector('.gain').textContent = `⏳ через ${secsLeft} мин`;
    } else {
      btn.disabled = false;
    }
  });
}

async function restoreEnergy(type, amount) {
  const now = Date.now();
  const cd = restoreCooldowns[type] || 0;
  if (cd && now - cd < RESTORE_COOLDOWN) return;

  restoreCooldowns[type] = now;

  nudgeState({ energy: amount, loneliness: -0.05 });
  updateMoodBar();
  updateEnergyBtn();

  // Реакция Моники
  const msgs = restoreMessages[type];
  const reply = msgs[Math.floor(Math.random() * msgs.length)];

  closeEnergy();

  // Небольшая задержка перед ответом
  await sleep(800 + Math.random() * 600);
  document.getElementById('typing').classList.add('show');
  await sleep(1000 + Math.random() * 800);
  document.getElementById('typing').classList.remove('show');
  addMessage('monika', reply);
  memory.history.push({ role: 'assistant', content: reply });
  memory.emotions.push(`восстановила энергию через: ${type}`);
  saveMemory();

  showNotif(`⚡ +${Math.round(amount*100)}% энергии`);
  renderEnergyPanel();
}

function updateEnergyBtn() {
  const btn = document.getElementById('energy-btn');
  if (memory.state.energy < 0.3) {
    btn.classList.add('low');
  } else {
    btn.classList.remove('low');
  }
}

// Обновляем updateMoodBar чтобы дёргать updateEnergyBtn — вставляем вызов в конец
const _origUpdateMoodBar2 = updateMoodBar;
updateMoodBar = function() {
  _origUpdateMoodBar2();
  updateEnergyBtn();
};


initSession();
scheduleRandomInitiative();
resetIgnoreTimer();
