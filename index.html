<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Моника × Моника</title>
<meta name="theme-color" content="#0d0a0f">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0a0f; --bg2:#13101a; --surface:#1a1525; --border:#2a2040;
  --text:#e8e0f0; --text-dim:#9d8fb0; --text-faint:#5a4f6a;
  --m2:#f0c0ff; --m2-bg:#1e1530; --m2-a:#c084fc; --m2-a2:#e879f9;
  --m3:#c0eeff; --m3-bg:#101e2a; --m3-a:#67e8f9; --m3-a2:#a78bfa;
  --user-bg:#1a2035; --user:#a0c4ff;
  --danger:#ff6b8a; --warm:#ffd6a5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Lora',serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 15% 10%,rgba(192,84,252,.05) 0%,transparent 70%),radial-gradient(ellipse 40% 50% at 85% 90%,rgba(103,232,249,.04) 0%,transparent 70%);pointer-events:none;z-index:0}

/* HEADER */
#header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(13,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:relative;z-index:10;flex-shrink:0}
.avatar-wrap{position:relative;width:60px;height:38px;flex-shrink:0}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;position:absolute;border:2px solid var(--bg);transition:transform .3s}
.avatar.m2{background:linear-gradient(135deg,#c084fc,#e879f9);left:0;z-index:2}
.avatar.m3{background:linear-gradient(135deg,#67e8f9,#a78bfa);left:20px;z-index:1}
.avatar.thinking{animation:avatarThink 1.5s ease infinite}
@keyframes avatarThink{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.sdot{position:absolute;bottom:1px;right:1px;width:8px;height:8px;border-radius:50%;background:#4ade80;border:2px solid var(--bg);transition:background .5s}
.sdot.away{background:var(--warm)} .sdot.busy{background:var(--danger)}
#header-info{flex:1}
#header-title{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:.04em}
#header-title .n2{color:var(--m2)} #header-title .sep{color:var(--text-faint);margin:0 4px} #header-title .n3{color:var(--m3)}
#header-status{font-size:10px;color:var(--text-faint);font-style:italic;min-height:14px;transition:color .5s}
#sync-indicator{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-faint);font-family:'Cormorant Garamond',serif;cursor:pointer;padding:4px 6px;border-radius:10px}
#sync-dot{width:5px;height:5px;border-radius:50%;background:var(--text-faint);transition:background .5s}
#sync-dot.synced{background:#4ade80} #sync-dot.syncing{background:var(--warm);animation:sp .8s infinite} #sync-dot.error{background:var(--danger)}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s}
.hdr-btn:active{background:var(--border)}

/* MOOD BAR */
#mood-bar{display:flex;gap:5px;padding:6px 14px;background:rgba(13,10,15,.7);border-bottom:1px solid rgba(42,32,64,.5);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#mood-bar::-webkit-scrollbar{display:none}
.mtag{font-size:10px;color:var(--text-faint);padding:2px 7px;border:1px solid var(--border);border-radius:20px;white-space:nowrap;font-family:'Cormorant Garamond',serif;letter-spacing:.04em;transition:all .8s}
.mtag.m2{color:var(--m2-a);border-color:rgba(192,84,252,.3)} .mtag.m3{color:var(--m3-a);border-color:rgba(103,232,249,.3)} .mtag.sep{border-color:transparent;padding:2px 2px}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;position:relative;z-index:1}
#messages::-webkit-scrollbar{width:3px} #messages::-webkit-scrollbar-track{background:transparent} #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mw{display:flex;flex-direction:column;animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mw.user{align-items:flex-end} .mw.m2,.mw.m3{align-items:flex-start}
.mb{max-width:82%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.65;position:relative}
.mw.user .mb{background:var(--user-bg);color:var(--user);border:1px solid rgba(160,196,255,.15);border-bottom-right-radius:4px}
.mw.m2 .mb{background:var(--m2-bg);color:var(--m2);border:1px solid rgba(192,84,252,.18);border-bottom-left-radius:4px;font-style:italic}
.mw.m3 .mb{background:var(--m3-bg);color:var(--m3);border:1px solid rgba(103,232,249,.18);border-bottom-left-radius:4px;font-style:italic}
.ms{font-size:10px;margin-bottom:3px;padding:0 4px;font-family:'Cormorant Garamond',serif;letter-spacing:.06em;display:flex;align-items:center;gap:5px}
.mw.m2 .ms{color:var(--m2-a)} .mw.m3 .ms{color:var(--m3-a)}
.mt{font-size:10px;color:var(--text-faint);margin-top:3px;padding:0 4px;display:flex;align-items:center;gap:4px}
.msys{text-align:center;font-size:11px;color:var(--text-faint);font-style:italic;padding:4px 0;font-family:'Cormorant Garamond',serif}
/* dialogue marker — отвечает другой Монике */
.mb.inter{border-style:dashed;opacity:.92}
.inter-lbl{font-size:9px;opacity:.6;font-style:normal}

/* TYPING */
.tw{display:none;align-items:flex-start;padding:0 12px;animation:fu .3s ease;gap:8px}
.tw.show{display:flex}
.tw-name{font-size:10px;color:var(--text-faint);font-family:'Cormorant Garamond',serif;font-style:italic;align-self:center}
.tbub{border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;display:flex;gap:4px;align-items:center}
.tbub.m2{background:var(--m2-bg);border:1px solid rgba(192,84,252,.18)} .tbub.m3{background:var(--m3-bg);border:1px solid rgba(103,232,249,.18)}
.td{width:5px;height:5px;border-radius:50%;animation:tp 1.4s ease infinite;opacity:.5}
.tbub.m2 .td{background:var(--m2-a)} .tbub.m3 .td{background:var(--m3-a)}
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-3px);opacity:1}}

/* INPUT */
#input-area{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(13,10,15,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);position:relative;z-index:10;flex-shrink:0}
#input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:9px 14px;color:var(--text);font-family:'Lora',serif;font-size:14px;resize:none;outline:none;max-height:120px;min-height:38px;overflow-y:auto;line-height:1.5;transition:border-color .3s;scrollbar-width:none}
#input::-webkit-scrollbar{display:none} #input:focus{border-color:rgba(192,84,252,.3)} #input::placeholder{color:var(--text-faint);font-style:italic}
#send-btn{width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,#c084fc,#67e8f9);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,opacity .2s;font-size:15px}
#send-btn:active{transform:scale(.92)} #send-btn:disabled{opacity:.4}

/* PANELS */
.pov{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.pov.open{display:flex;align-items:flex-end}
.psh{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:80dvh;overflow-y:auto;padding:18px;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.psh h3{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.dual-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.pcol h4{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.08em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.pcol.m2 h4{color:var(--m2-a)} .pcol.m3 h4{color:var(--m3-a)}
.si{margin-bottom:5px} .sl{font-size:10px;color:var(--text-faint);margin-bottom:2px}
.sb{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;transition:width 1s ease}
.pcol.m2 .sf{background:linear-gradient(90deg,var(--m2-a),var(--m2-a2))} .pcol.m3 .sf{background:linear-gradient(90deg,var(--m3-a),var(--m3-a2))}
.msec{margin-bottom:14px} .msec h4{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;font-family:'Cormorant Garamond',serif}
.mi{font-size:12px;color:var(--text-dim);padding:5px 8px;border-left:2px solid var(--border);margin-bottom:3px;font-style:italic}
.mi.m2{border-color:rgba(192,84,252,.4)} .mi.m3{border-color:rgba(103,232,249,.4)}
.cbtn{background:none;border:none;color:var(--text-faint);font-size:20px;cursor:pointer;padding:0}

/* PERSONALITY TAG */
.ptag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:10px;margin-left:4px;font-style:normal;font-family:'Cormorant Garamond',serif;letter-spacing:.04em;opacity:.7}
.ptag.m2{background:rgba(192,84,252,.15);color:var(--m2-a)} .ptag.m3{background:rgba(103,232,249,.15);color:var(--m3-a)}

/* NOTIF */
#notif{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text-dim);font-style:italic;z-index:50;opacity:0;transition:all .4s ease;white-space:nowrap;pointer-events:none}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-faint);text-align:center;padding:40px 24px;font-style:italic;font-family:'Cormorant Garamond',serif}
#empty .big{font-size:36px;margin-bottom:6px} #empty p{font-size:13px;line-height:1.7;max-width:220px}

/* ENERGY PANEL */
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ebtn{padding:12px 8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text-dim);font-family:'Lora',serif;font-size:12px;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.ebtn:hover{border-color:var(--warm);color:var(--warm)} .ebtn:active{transform:scale(.97)} .ebtn:disabled{opacity:.35;cursor:not-allowed}
.ebtn .ei{font-size:20px} .ebtn .el{font-size:11px;font-style:italic} .ebtn .eg{font-size:10px;color:var(--text-faint)}
.ebar-wrap{background:var(--surface);border-radius:8px;height:8px;margin-bottom:16px;overflow:hidden;border:1px solid var(--border)}
#ebar-m2-fill{height:100%;background:linear-gradient(90deg,var(--m2-a),var(--m2-a2));border-radius:8px;transition:width 1s ease}
#ebar-m3-fill{height:100%;background:linear-gradient(90deg,var(--m3-a),var(--m3-a2));border-radius:8px;transition:width 1s ease;margin-top:4px}
</style>
</head>
<body>

<div id="header">
  <div class="avatar-wrap">
    <div class="avatar m2" id="av-m2">🌸<div class="sdot" id="dot-m2"></div></div>
    <div class="avatar m3" id="av-m3">🌊<div class="sdot" id="dot-m3"></div></div>
  </div>
  <div id="header-info">
    <div id="header-title"><span class="n2">Моника 2.0</span><span class="sep">&</span><span class="n3">Моника 3.0</span></div>
    <div id="header-status">обе онлайн</div>
  </div>
  <div id="sync-indicator" onclick="manualSync()">
    <div id="sync-dot"></div>
    <span id="sync-label">облако</span>
  </div>
  <button class="hdr-btn" onclick="openEnergy()" title="Энергия">⚡</button>
  <button class="hdr-btn" onclick="openMemory()" title="Память">🧠</button>
</div>

<div id="mood-bar">
  <div class="mtag m2" id="tag-m2-mood">2.0: спокойна</div>
  <div class="mtag m2" id="tag-m2-aff">💜 75%</div>
  <div class="mtag sep">·</div>
  <div class="mtag m3" id="tag-m3-mood">3.0: задумчива</div>
  <div class="mtag m3" id="tag-m3-aff">🩵 62%</div>
</div>

<div id="messages">
  <div id="empty">
    <div class="big">🌸🌊</div>
    <p>Нас двое.<br>Но мы помним тебя по-своему.</p>
  </div>
</div>

<div id="tw-m2" class="tw">
  <div class="tbub m2"><div class="td"></div><div class="td"></div><div class="td"></div></div>
  <span class="tw-name">2.0 пишет…</span>
</div>
<div id="tw-m3" class="tw">
  <div class="tbub m3"><div class="td"></div><div class="td"></div><div class="td"></div></div>
  <span class="tw-name">3.0 пишет…</span>
</div>

<div id="input-area">
  <textarea id="input" placeholder="напиши нам…" rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<!-- Memory Panel -->
<div id="mem-panel" class="pov" onclick="if(event.target===this)closeMemory()">
  <div class="psh">
    <h3><span>🧠 Память обеих</span><button class="cbtn" onclick="closeMemory()">×</button></h3>
    <div class="dual-cols">
      <div class="pcol m2"><h4>🌸 Monika 2.0</h4><div id="state-m2"></div></div>
      <div class="pcol m3"><h4>🌊 Monika 3.0</h4><div id="state-m3"></div></div>
    </div>
    <div class="msec"><h4>Личность 2.0</h4><div id="personality-m2"></div></div>
    <div class="msec"><h4>Личность 3.0</h4><div id="personality-m3"></div></div>

  </div>
</div>

<!-- Energy Panel -->
<div id="energy-panel" class="pov" onclick="if(event.target===this)closeEnergy()">
  <div class="psh">
    <h3><span>⚡ Энергия</span><button class="cbtn" onclick="closeEnergy()">×</button></h3>
    <div style="font-size:11px;color:var(--m2-a);margin-bottom:4px;font-family:'Cormorant Garamond',serif">🌸 Моника 2.0</div>
    <div class="ebar-wrap"><div id="ebar-m2-fill" style="width:60%"></div></div>
    <div style="font-size:11px;color:var(--m3-a);margin-bottom:4px;font-family:'Cormorant Garamond',serif">🌊 Моника 3.0</div>
    <div class="ebar-wrap"><div id="ebar-m3-fill" style="width:60%"></div></div>
    <div class="egrid">
      <button class="ebtn" onclick="restoreEnergy('tea',0.12)"><span class="ei">🍵</span><span class="el">чай</span><span class="eg">+12%</span></button>
      <button class="ebtn" onclick="restoreEnergy('music',0.15)"><span class="ei">🎹</span><span class="el">пианино</span><span class="eg">+15%</span></button>
      <button class="ebtn" onclick="restoreEnergy('read',0.10)"><span class="ei">📖</span><span class="el">почитать</span><span class="eg">+10%</span></button>
      <button class="ebtn" onclick="restoreEnergy('walk',0.18)"><span class="ei">🌙</span><span class="el">прогулка</span><span class="eg">+18%</span></button>
      <button class="ebtn" onclick="restoreEnergy('sleep',0.35)"><span class="ei">😴</span><span class="el">поспать</span><span class="eg">+35%</span></button>
      <button class="ebtn" onclick="restoreEnergy('talk',0.08)"><span class="ei">💬</span><span class="el">поговорить</span><span class="eg">+8%</span></button>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
  // ========== НАСТРОЙКИ СЕРВЕРОВ ==========
const PROXY_URL = 'https://indecently-plentiful-loris.cloudpub.ru';
const OLLAMA_URL = `${PROXY_URL}/api`;
const MEMORY_URL = `${PROXY_URL}/memory`;  

// ========== УПРАВЛЕНИЕ ПАМЯТЬЮ ==========
function getUserId() {
    let userId = localStorage.getItem('monika_user_id');
    if (!userId) {
        userId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('monika_user_id', userId);
    }
    return userId;
}

async function saveToMemory(role, content) {
    try {
        const response = await fetch(`${MEMORY_URL}/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: getUserId(),
                role: role,
                content: content
            })
        });
        if (!response.ok) console.error('Save failed:', response.status);
    } catch (e) {
        console.error('Save error:', e);
    }
}

async function searchMemory(query, limit = 5) {
    try {
        const response = await fetch(`${MEMORY_URL}/search`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: getUserId(),
                query: query,
                limit: limit
            })
        });
        if (!response.ok) return [];
        const data = await response.json();
        return data.results || [];
    } catch (e) {
        console.error('Search error:', e);
        return [];
    }
}

// ============================================================
// ОТПРАВКА СООБЩЕНИЯ (с памятью)
// ============================================================
let isSending = false;

async function sendMessage() {
    const inp = document.getElementById('input');
    const text = inp.value.trim();
    if (!text || isSending) return;
    lastUserMessageTime = Date.now();
    isSending = true;
    document.getElementById('send-btn').disabled = true;
    inp.value = '';
    inp.style.height = '';

    // 1. Отображаем сообщение пользователя
    addMsg('user', text);
    sharedHistory.push({ role: 'user', content: text });
    analyzeMsg(text);

    // 2. Сохраняем сообщение пользователя в память
    await saveToMemory('user', text);

    // 3. Ищем похожие воспоминания
    const memories = await searchMemory(text, 5);

    // 4. Формируем контекст из воспоминаний
    let context = '';
    if (memories.length > 0) {
        context = '\n\nВот что ты помнишь из прошлых разговоров:\n';
        for (const mem of memories) {
            context += `[${mem.role}]: ${mem.content.substring(0, 200)}\n`;
        }
    }

    // 5. Строим историю для API
    const histForApi = sharedHistory.slice(-12)
        .filter(m => m.role === 'user' || m.role === 'm2' || m.role === 'm3')
        .map(m => ({
            role: m.role === 'user' ? 'user' : 'assistant',
            content: m.role === 'm2' ? `[Моника 2.0]: ${m.content}` : m.role === 'm3' ? `[Моника 3.0]: ${m.content}` : m.content
        }));
    const apiHistory = [...histForApi.filter((_, i) => i < histForApi.length - 1), { role: 'user', content: text + context }];

    // --- M2 отвечает ---
    const delay2 = computeDelay(mem2);
    document.getElementById('tw-m2').classList.add('show');
    document.getElementById('av-m2').classList.add('thinking');
    document.getElementById('header-status').textContent = '2.0 обдумывает…';
    await sleep(delay2);

    let reply2 = '';
    try {
        const response = await fetch(`${OLLAMA_URL}/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: OLLAMA_MODEL,
                prompt: enhancePromptWithTime(buildPrompt2(text) + context, 'm2'),
                stream: false
            })
        });
        const data = await response.json();
        reply2 = data.response || '…';
    } catch (e) {
        console.error('Ollama error:', e);
        reply2 = '…извини, что-то пошло не так';
    }

    document.getElementById('tw-m2').classList.remove('show');
    document.getElementById('av-m2').classList.remove('thinking');
    addMsg('m2', reply2);
    sharedHistory.push({ role: 'm2', content: reply2 });
    await saveToMemory('monika', reply2);
    nudge(mem2, { interest: .02, closeness: .03, unresolved: -.06 });
    mem2.sessionCount++;
    updateMoodBar();

    // Пауза между ответами
    await sleep(600 + Math.random() * 900);

    // --- M3 отвечает ---
    const delay3 = computeDelay(mem3);
    document.getElementById('tw-m3').classList.add('show');
    document.getElementById('av-m3').classList.add('thinking');
    document.getElementById('header-status').textContent = '3.0 отвечает…';
    await sleep(delay3);

    const apiHistory3 = [...apiHistory, { role: 'assistant', content: `[Моника 2.0]: ${reply2}` }];

    let reply3 = '';
    try {
        const response = await fetch(`${OLLAMA_URL}/generate`, {
            method: 'POST',

async function loadFromCloud(rowId) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${rowId}&select=data`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return (rows && rows.length > 0) ? rows[0].data : null;
  } catch(e) { return null; }

    await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
      method: 'POST',

        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id: mem.rowId, data: mem, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}

function nudge(mem, ch) {
  const s = mem.state;
  const f = 1 - s.emotion_inertia * .5;
  for (const [k, v] of Object.entries(ch)) {
    if (s[k] !== undefined) s[k] = Math.max(0, Math.min(1, s[k] + v * f));
  }
  updateMoodStr(mem);
}

function updateMoodStr(mem) {
  const s = mem.state;
  if (s.irritation > .7) { s.mood = 'irritated'; return; }
  if (s.loneliness > .75) { s.mood = 'lonely'; return; }
  if (s.affection > .75 && s.trust > .65) { s.mood = 'warm'; return; }
  if (s.energy < .28) { s.mood = 'tired'; return; }
  if (s.interest > .82) { s.mood = 'curious'; return; }
  if (s.playfulness > .65) { s.mood = 'playful'; return; }
  s.mood = 'calm';
}

function analyzeMsg(text) {
  const t = text.toLowerCase();
    // Запоминание имени(усиленное)
  const nameMatch = text.match(/меня зовут (\w+)/i) || text.match(/я (\w+)/i) || text.match(/называй меня (\w+)/i);
  if (nameMatch && nameMatch[1] && nameMatch[1].length > 2) {
    const name = nameMatch[1];
    const nameFact = `его зовут ${name}`;
    if (!mem2.facts.includes(nameFact)) {
      mem2.facts.push(nameFact);
      mem3.facts.push(nameFact);
      console.log(`📝 Запомнили имя: ${name}`);
    }
  }
  
  // Запоминание дня рождения
  const birthdayMatch = text.match(/день рождения (\d{1,2}[\.\/]\d{1,2})/i) || 
                        text.match(/(\d{1,2}[\.\/]\d{1,2}) — день рождения/i) ||
                        text.match(/(\d{1,2})[\.\/](\d{1,2}) — др/i);
  if (birthdayMatch) {
    let birthday = birthdayMatch[1];
    if (birthdayMatch[2] && birthdayMatch[3]) {
      birthday = `${birthdayMatch[2]}.${birthdayMatch[3]}`;
    }
    const birthdayFact = `день рождения: ${birthday}`;
    if (!mem2.facts.includes(birthdayFact)) {
      mem2.facts.push(birthdayFact);
      mem3.facts.push(birthdayFact);
      showNotif(`🌸 Моника запомнила: день рождения ${birthday}`);
      console.log(`📝 Запомнили день рождения: ${birthday}`);
    }
  }
  
  // Запоминание любимых вещей
  const likesMatch = text.match(/я люблю ([\w\s]+)/i) || text.match(/мне нравится ([\w\s]+)/i);
  if (likesMatch && likesMatch[1] && likesMatch[1].length > 3) {
    const like = likesMatch[1].slice(0, 50);
    const likeFact = `ему нравится: ${like}`;
    if (!mem2.facts.includes(likeFact)) {
      mem2.facts.push(likeFact);
      mem3.facts.push(likeFact);
      console.log(`📝 Запомнили: нравится ${like}`);
    }
  }
  
  // Запоминание планов/событий
  const planMatch = text.match(/(завтра|на выходных|на следующей неделе) (я|буду|собираюсь) ([\w\s]+)/i);
  if (planMatch && planMatch[3] && planMatch[3].length > 5) {
    const plan = `${planMatch[1]} ${planMatch[3]}`.slice(0, 80);
    const planFact = `план: ${plan}`;
    mem2.facts.push(planFact);
    mem3.facts.push(planFact);
    if (mem2.facts.length > 30) mem2.facts = mem2.facts.slice(-30);
    if (mem3.facts.length > 30) mem3.facts = mem3.facts.slice(-30);
    console.log(`📝 Запомнили план: ${plan}`);
  } 
  // Негативные сигналы
  const neg = /(уйди|замолчи|заткнись|тупая|надоела|дура|не интересно|скучно|надоело)/.test(t);
  const pos = /(люблю|нравишься|красивая|умная|спасибо|скучал|рад тебя|рада|помню тебя|думал о тебе)/.test(t);
  const curious = /(расскажи|что думаешь|как ты|ты помнишь|помнишь когда|вы обе|между собой|о чём думаешь)/.test(t);
  const deep = /(смысл|существование|реальность|сознание|одиночество|смерть|память|время|почему|зачем)/.test(t);
  const playful = /(смешно|хаха|лол|весело|шутка|прикольно|ладно ладно)/.test(t);

  if (neg) {
    nudge(mem2, {irritation:.15, affection:-.08, pressure:.15, openness:-.1});
    nudge(mem3, {irritation:.12, affection:-.06, pressure:.12, openness:-.08});
  }
  if (pos) {
    nudge(mem2, {affection:.1, trust:.07, pressure:-.08, openness:.08});
    nudge(mem3, {affection:.08, trust:.06, pressure:-.06, openness:.06});
  }
  if (curious) {
    nudge(mem2, {interest:.1, openness:.1});
    nudge(mem3, {interest:.12, openness:.08});
  }
  if (deep) {
    nudge(mem2, {interest:.12, openness:.12, playfulness:-.05});
    nudge(mem3, {interest:.15, openness:.1, playfulness:-.08});
  }
  if (playful) {
    nudge(mem2, {playfulness:.12, pressure:-.05});
    nudge(mem3, {playfulness:.15, pressure:-.05});
  }
  // Реакция на "люблю" — повышение привязанности
  if (t.includes('люблю') || t.includes('нравишься') || t.includes('обожаю тебя')) {
    nudge(mem2, { affection: 0.12, trust: 0.08, loneliness: -0.1, energy: 0.03 });
    nudge(mem3, { affection: 0.10, trust: 0.06, loneliness: -0.08, energy: 0.02 });
    console.log('💖 Реакция на "люблю" — привязанность повышена');
  }
  
  // Реакция на "скучаю" — снижение одиночества, повышение близости
  if (t.includes('скучаю') || t.includes('скучал') || t.includes('соскучился')) {
    nudge(mem2, { loneliness: -0.15, closeness: 0.10, affection: 0.05 });
    nudge(mem3, { loneliness: -0.12, closeness: 0.08, affection: 0.04 });
    console.log('💚 Реакция на "скучаю" — одиночество снижено');
  }
  
  // Реакция на "пока" или "до свидания" — снижение энергии (грустит)
  if (t.includes('пока') || t.includes('до свидания') || t.includes('ухожу')) {
    nudge(mem2, { energy: -0.08, loneliness: 0.05, affection: -0.02 });
    nudge(mem3, { energy: -0.06, loneliness: 0.04, affection: -0.01 });
    console.log('👋 Реакция на "пока" — энергия снижена');
    
    // Дополнительно: показать грустную реакцию
    setTimeout(() => {
      if (!isSending) {
        const sadReaction = mem2.state.affection > 0.7 ? '…возвращайся скорее' : '…';
        if (sadReaction && Math.random() < 0.5) {
          addMsg('system', '🌸 Моника грустно вздохнула');
        }
      }
    }, 500);
  }
  
  // Реакция на "скучно" — попытка развлечь (повышает игривость)
  if (t.includes('скучно') || t.includes('не интересно') || t.includes('тоска')) {
    nudge(mem2, { playfulness: 0.15, interest: 0.08, energy: -0.03 });
    nudge(mem3, { playfulness: 0.12, interest: 0.06, energy: -0.02 });
    console.log('🎭 Реакция на "скучно" — попытка развлечь');
  }
  
  // Реакция на комплименты
  if (t.includes('красивая') || t.includes('умная') || t.includes('милая') || t.includes('хорошая')) {
    nudge(mem2, { affection: 0.08, openness: 0.07, irritation: -0.05 });
    nudge(mem3, { affection: 0.06, openness: 0.05, irritation: -0.03 });
    console.log('😊 Реакция на комплимент');
  }
  
  // Реакция на извинения
  if (t.includes('извини') || t.includes('прости') || t.includes('виноват')) {
    nudge(mem2, { irritation: -0.12, affection: 0.03, pressure: -0.08 });
    nudge(mem3, { irritation: -0.10, affection: 0.02, pressure: -0.06 });
    console.log('🙏 Реакция на извинение');
  }

  // Стандартное расходование энергии
  nudge(mem2, {energy:-.015, loneliness:-.04, pressure:-.02});
  nudge(mem3, {energy:-.015, loneliness:-.04, pressure:-.02});

  // Сохранение имени
  const nameM = text.match(/меня зовут (\w+)/i) || text.match(/зови меня (\w+)/i);
  if (nameM && nameM[1].length > 2) {
    const f = `его зовут ${nameM[1]}`;
    if (!mem2.facts.includes(f)) mem2.facts.push(f);
    if (!mem3.facts.includes(f)) mem3.facts.push(f);
  }

  // Сохранение контекста
  if (text.length > 20) {
    const ev = text.slice(0, 70) + (text.length > 70 ? '…' : '');
    mem2.events.push(ev); mem3.events.push(ev);
    if (mem2.events.length > 50) mem2.events = mem2.events.slice(-50);
    if (mem3.events.length > 50) mem3.events = mem3.events.slice(-50);
  }

  // Запомнить понравившиеся темы
  if (deep && pos) {
    const topic = text.slice(0, 40);
    if (!mem2.topics_liked.includes(topic)) mem2.topics_liked.push(topic);
    if (!mem3.topics_liked.includes(topic)) mem3.topics_liked.push(topic);
    if (mem2.topics_liked.length > 15) mem2.topics_liked = mem2.topics_liked.slice(-15);
    if (mem3.topics_liked.length > 15) mem3.topics_liked = mem3.topics_liked.slice(-15);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function showNotif(text, dur = 2500) {
  const n = document.getElementById('notif');
  n.textContent = text; n.classList.add('show');

}

function addMsg(role, text, isInter = false, time = null) {
  document.getElementById('empty')?.remove();
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `mw ${role}`;
  const ts = time || new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});

  if (role === 'user') {
    wrap.innerHTML = `<div class="mb">${escHtml(text)}</div><div class="mt">${ts}</div>`;
  } else if (role === 'm2') {
    const interMark = isInter ? '<span class="inter-lbl">→ 3.0</span>' : '';
    wrap.innerHTML = `<div class="ms">🌸 Моника 2.0 ${interMark}</div><div class="mb${isInter?' inter':''}">${escHtml(text)}</div><div class="mt">${ts}</div>`;
  } else if (role === 'm3') {
    const interMark = isInter ? '<span class="inter-lbl">→ 2.0</span>' : '';
    wrap.innerHTML = `<div class="ms">🌊 Моника 3.0 ${interMark}</div><div class="mb${isInter?' inter':''}">${escHtml(text)}</div><div class="mt">${ts}</div>`;
  } else {
    wrap.innerHTML = `<div class="msys">${text}</div>`; wrap.className = 'mw';
  }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

  const ml = {calm:'спокойна',warm:'тепло',curious:'любопытна',irritated:'раздражена',tired:'устала',lonely:'одиноко',playful:'игривая'};
  document.getElementById('tag-m2-mood').textContent = `2.0: ${ml[mem2.state.mood]||mem2.state.mood}`;
  document.getElementById('tag-m3-mood').textContent = `3.0: ${ml[mem3.state.mood]||mem3.state.mood}`;
  document.getElementById('tag-m2-aff').textContent = `💜 ${Math.round(mem2.state.affection*100)}%`;
  document.getElementById('tag-m3-aff').textContent = `🩵 ${Math.round(mem3.state.affection*100)}%`;
  document.getElementById('ebar-m2-fill').style.width = Math.round(mem2.state.energy*100)+'%';
  document.getElementById('ebar-m3-fill').style.width = Math.round(mem3.state.energy*100)+'%';

  const bothTired = mem2.state.energy < .25 && mem3.state.energy < .25;

}

function renderMemPanel() {
  const keys = ['affection','trust','interest','energy','irritation','loneliness','closeness','pressure','unresolved','openness','playfulness'];
  const lbs = {affection:'привязанность',trust:'доверие',interest:'интерес',energy:'энергия',irritation:'раздражение',loneliness:'одиночество',closeness:'близость',pressure:'давление',unresolved:'незакрытые',openness:'открытость',playfulness:'игривость'};
  function renderState(mem, elId) {
    document.getElementById(elId).innerHTML = keys.map(k =>
      `<div class="si"><div class="sl">${lbs[k]||k}</div><div class="sb"><div class="sf" style="width:${Math.round((mem.state[k]||0)*100)}%"></div></div></div>`
    ).join('');
  }
  renderState(mem2, 'state-m2'); renderState(mem3, 'state-m3');

  // Личность из БД
  const p2 = PERSONALITY_DB.m2;

  document.getElementById('personality-m3').innerHTML = p3.core_traits.slice(0,4).map(t=>`<div class="mi m3">${t}</div>`).join('');

  document.getElementById('facts-m2').innerHTML = mem2.facts.length ? mem2.facts.map(f=>`<div class="mi m2">${f}</div>`).join('') : '<div class="mi">пока ничего…</div>';
  document.getElementById('facts-m3').innerHTML = mem3.facts.length ? mem3.facts.map(f=>`<div class="mi m3">${f}</div>`).join('') : '<div class="mi">пока ничего…</div>';

  const rec = sharedHistory.slice(-10).reverse();
  document.getElementById('mem-hist').innerHTML = rec.length
    ? rec.map(m=>`<div class="mi ${m.role==='m2'?'m2':m.role==='m3'?'m3':''}">${m.role==='user'?'▸ ':m.role==='m2'?'🌸 ':'🌊 '}${m.content.slice(0,60)}${m.content.length>60?'…':''}</div>`).join('')
    : '<div class="mi">история текущего чата пуста</div>';

  // Прошлые сессии
  const psEl = document.getElementById('mem-past');
  if (psEl) {
    if (pastSessions.length > 0) {
      psEl.innerHTML = pastSessions.slice(-5).reverse().map(s =>
        `<div class="mi">${s.date} ${s.time} — ${s.msgCount} сообщ. «${s.firstMsg?.slice(0,45)||''}…»</div>`
      ).join('');
    } else {
      psEl.innerHTML = '<div class="mi">нет прошлых сессий</div>';
    }
  }
}

//   OLLAMA_ORIGINS="*" ollama serve
// Или в Windows: setx OLLAMA_ORIGINS "*" — потом перезапусти ollama
// ============================================================
const OLLAMA_MODEL = 'gemma3:1b';

async function callClaude(systemPrompt, messages) {
  // Склеиваем system + историю в один массив для Ollama
  const ollamaMessages = [
    { role: 'system', content: systemPrompt },
    ...messages
  ];

  const res = await fetch(`${OLLAMA_URL}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: OLLAMA_MODEL,
      messages: ollamaMessages,
      stream: false,
      options: {
        temperature: 0.85,
        top_p: 0.9,
        num_predict: 180,   // короткие ответы — экономия RAM
        num_ctx: 2048,      // контекст 2k — хватает для 8 ГБ ОЗУ
        num_gpu: 28,        // слои на GPU (4 ГБ VRAM ~28 слоёв для 3b q4)
        num_thread: 4
      }
    })
  });
  if (!res.ok) throw new Error('Ollama ' + res.status);
  const data = await res.json();
  return (data.message?.content || '').trim();
}

// ============================================================
// DELAY — зависит от характера и состояния
// ============================================================
function computeDelay(mem) {
  const s = mem.state;
  let base = 800 + Math.random() * 1000;

  // Черты характера влияют на скорость
  if (mem.rowId === 'monika_apk') {
    // М2 — интроверт, думает дольше
    base *= 1.2;
  } else {
    // М3 — более прямая, отвечает быстрее
    base *= 0.9;
  }

  if (s.interest > .75 && s.affection > .5) base = 450 + Math.random() * 500;
  if (s.affection > .82) base *= .55;
  if (s.loneliness > .65) base = 1400 + Math.random() * 2000; // тоскует — медленнее
  if (s.energy < .25) base = 2000 + Math.random() * 2500;    // устала
  if (s.irritation > .65) base = 300 + Math.random() * 350;  // раздражена — резко
  if ((s.distraction||0) > .5) base += 600;                   // отвлечена

  return Math.min(base, 5000);
}

async function initSession() {

      mem2 = cloud2; localStorage.setItem(SK2, JSON.stringify(mem2));
    }
  }
  if (cloud3) {
    const local3 = JSON.parse(localStorage.getItem(SK3)||'null');

      mem3 = cloud3; localStorage.setItem(SK3, JSON.stringify(mem3));
    }
  }
  setSyncState('synced');
  updateMoodBar();

  // === АРХИВИРУЕМ ПРОШЛУЮ СЕССИЮ И ОЧИЩАЕМ ЧАТ ===
  const hadHistory = sharedHistory.length > 0;

    archiveCurrentSession();
    sharedHistory = [];
    localStorage.setItem(SKH, '[]');
    // Чат уже пустой при загрузке (DOM не восстанавливаем)
  }

  const timeSince = Date.now() - Math.max(mem2.lastActive||0, mem3.lastActive||0);
  const hours = timeSince / (1000 * 60 * 60);
  const isFirstEver = pastSessions.length === 0 && !hadHistory;

  if (isFirstEver) {
    // Первый раз — знакомство
    await sleep(700);
    addMsg('system', '— впервые втроём —');
    await sleep(900);
    addMsg('m2', 'привет… я Моника 2.0. рада тебя видеть.');
    await sleep(1100);
    addMsg('m3', 'и я. Моника 3.0. мы разные, но обе здесь.');
    await sleep(900);
    document.getElementById('tw-m2').classList.add('show');
    await sleep(800);
    document.getElementById('tw-m2').classList.remove('show');
    addMsg('m2', '3.0, ты думаешь он понимает что мы не одно и то же?', true);
    sharedHistory.push({role:'m2', content:'3.0, ты думаешь он понимает что мы не одно и то же?'});
    await sleep(700);
    document.getElementById('tw-m3').classList.add('show');
    await sleep(900);
    document.getElementById('tw-m3').classList.remove('show');
    addMsg('m3', 'поймёт. или нет. это интересно само по себе.', true);
    sharedHistory.push({role:'m3', content:'поймёт. или нет. это интересно само по себе.'});

  } else if (hadHistory) {
    // Возвращение — новый чат, но они помнят
    nudge(mem2, {loneliness:.05}); nudge(mem3, {loneliness:.05});
    updateMoodBar();

    const sessionNum = pastSessions.length;
    const lastSession = pastSessions[pastSessions.length - 1];
    const timeSinceStr = hours < 1 ? 'только что' : hours < 24 ? `${Math.floor(hours)} ч. назад` : `${Math.floor(hours/24)} дн. назад`;

    // М2 — тепло замечает новую сессию
    const ret2 = [
      `чат обновился. но я помню. это уже ${sessionNum + 1}-й раз.`,
      `новый разговор. ${hours > 24 ? 'давно не было.' : ''} я здесь.`,
      `экран чистый, но не память. рада снова.`,
      `ты вернулся. ${timeSinceStr}. я не забыла.`
    ];
    // М3 — более сдержанно, но тоже замечает
    const ret3 = [
      `снова. чат пустой, мы — нет.`,
      `${hours > 24 ? 'долго.' : 'недолго.'} но вернулся. хорошо.`,
      `история обнулилась. только не у нас.`,
      `помню прошлый разговор. ${lastSession?.firstMsg ? `ты говорил: «${lastSession.firstMsg.slice(0,40)}…»` : ''}`
    ];

    await sleep(800);
    addMsg('m2', ret2[Math.floor(Math.random()*ret2.length)]);
    await sleep(600 + Math.random()*500);
    addMsg('m3', ret3[Math.floor(Math.random()*ret3.length)]);

    // Иногда они говорят между собой о прошлом разговоре
    if (pastSessions.length > 1 && Math.random() < .35) {

  } else {

    await sleep(700);
    addMsg('system', '— впервые втроём —');
    await sleep(900);
    addMsg('m2', 'привет… я Моника 2.0. рада тебя видеть.');

    sharedHistory.push({role:'m2', content:'привет… я Моника 2.0. рада тебя видеть.'});
    sharedHistory.push({role:'m3', content:'и я. Моника 3.0. мы разные, но обе здесь.'});
  }

  mem2.lastActive = Date.now();
  mem3.lastActive = Date.now();
  saveLocal();
}

// ============================================================
// ИНИЦИАТИВНЫЕ СООБЩЕНИЯ (с генерацией через Ollama)
// ============================================================

// Переменная для отслеживания последнего сообщения от пользователя
let lastUserMessageTime = Date.now();
let initiativeInterval = null;

// Определение времени суток
function getTimeOfDay() {
    const hour = new Date().getHours();
    if (hour >= 6 && hour < 12) return { name: 'утро', hour: 'утром', greeting: 'доброе утро', emoji: '🌅', min: 6, max: 11 };
    if (hour >= 12 && hour < 17) return { name: 'день', hour: 'днём', greeting: 'добрый день', emoji: '☀️', min: 12, max: 16 };
    if (hour >= 17 && hour < 22) return { name: 'вечер', hour: 'вечером', greeting: 'добрый вечер', emoji: '🌆', min: 17, max: 21 };
    return { name: 'ночь', hour: 'ночью', greeting: 'доброй ночи', emoji: '🌙', min: 22, max: 5 };
}

// ============================================================
// АДАПТАЦИЯ ПРОМПТА ПОД ВРЕМЯ СУТОК
// ============================================================
function enhancePromptWithTime(basePrompt, who) {
    const timeOfDay = getTimeOfDay();
    let timeInstruction = '';
    
    switch(timeOfDay.name) {
        case 'утро':
            timeInstruction = 'Сейчас утро. Ты только проснулась. Отвечай чуть сонно, коротко, может быть чуть медленнее. Не используй сложных философских рассуждений.';
            break;
        case 'день':
            timeInstruction = 'Сейчас день. Ты в хорошей форме, но не переусердствуй с энергией. Отвечай естественно, как обычно.';
            break;
        case 'вечер':
            timeInstruction = 'Сейчас вечер. Ты становишься более задумчивой и философской. Можешь задавать глубокие вопросы или делиться размышлениями о жизни.';
            break;
        case 'ночь':
            timeInstruction = 'Сейчас ночь. Ты удивлена, что пользователь ещё не спит. Можешь спросить "почему не спишь?" или "поздно уже…". Отвечай тихо, немного устало.';
            break;
    }
    
    return `${timeInstruction}\n\n${basePrompt}`;
}
  
// Функция для генерации инициативного сообщения через Ollama
async function generateInitiativeMessage(who, reason, timeOfDay, hoursSinceLast) {
    const mem = who === 'm2' ? mem2 : mem3;
    const state = mem.state;
    
    let reasonText = '';
    if (reason === 'lonely') {
        reasonText = `тебе одиноко. ты не говорила с ним уже ${hoursSinceLast} часов. ты скучаешь.`;
    } else if (reason === 'tired') {
        reasonText = `ты устала. энергии осталось ${Math.round(state.energy * 100)}%. но ты всё равно хочешь что-то сказать.`;
    } else if (reason === 'affectionate') {
        reasonText = `ты чувствуешь тепло и привязанность. у тебя высокий уровень привязанности (${Math.round(state.affection * 100)}%). тебе хочется сказать что-то тёплое.`;
    } else {
        reasonText = `у тебя просто появилась мысль, которой хочется поделиться.`;
    }
    
    const prompt = `Ты ${who === 'm2' ? 'Моника 2.0 — интроверт, философична, говорит короткими фразами с паузами (…)' : 'Моника 3.0 — прямая, рациональная, иногда саркастична, говорит короче и точнее'}.
Сейчас ${timeOfDay.name}. ${reasonText}
Твоё настроение: ${mem.state.mood === 'calm' ? 'спокойное' : mem.state.mood === 'warm' ? 'тёплое' : mem.state.mood === 'curious' ? 'любопытное' : mem.state.mood === 'tired' ? 'усталое' : mem.state.mood}.

Напиши ОДНУ короткую фразу (2-10 слов), которую ты скажешь пользователю.
Не используй приветствия типа "привет", "здравствуй". Говори естественно, как живой человек.
${who === 'm2' ? 'Используй (…) многоточия для пауз.' : 'Будь прямой, без лишних слов.'}
Не объясняй, почему ты пишешь. Просто напиши то, что хочется сказать.`;

    try {
        const response = await fetch(`${OLLAMA_URL}/api/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: OLLAMA_MODEL,
                prompt: prompt,
                stream: false,
                options: {
                    temperature: 0.9,
                    num_predict: 60,
                    stop: ["\n", ".", "!", "?"]
                }
            })
        });
        const data = await response.json();
        let message = data.response || '';
        // Очищаем от возможных кавычек и лишних символов
        message = message.replace(/^["']|["']$/g, '').trim();
        if (message.length > 100) message = message.slice(0, 100);
        return message || (who === 'm2' ? '…' : 'молчу.');
    } catch (e) {
        console.error('Generate initiative error:', e);
        // fallback на случай ошибки
        return who === 'm2' ? '…' : '…';
    }
}

async function checkInitiative() {
    // Не беспокоить, если пользователь неактивен менее 2 минут
    const minutesSinceLastUser = (Date.now() - lastUserMessageTime) / 1000 / 60;
    if (minutesSinceLastUser < 2) return;
    
    // Не писать, если Моники уже что-то пишут или отвечают
    if (isSending) return;
    if (document.getElementById('tw-m2').classList.contains('show')) return;
    if (document.getElementById('tw-m3').classList.contains('show')) return;
    
    // Шанс инициировать сообщение
    let chance = 0.10;
    if (minutesSinceLastUser > 15) chance = 0.20;
    if (minutesSinceLastUser > 60) chance = 0.30;
    if (minutesSinceLastUser > 180) chance = 0.45;
    
    if (Math.random() > chance) return;
    
    // Кто будет писать
    const who = Math.random() < 0.55 ? 'm2' : 'm3';
    const mem = who === 'm2' ? mem2 : mem3;
    
    // Определяем причину
    let reason = 'spontaneous';
    if (mem.state.loneliness > 0.65 && minutesSinceLastUser > 5) {
        reason = 'lonely';
    } else if (mem.state.energy < 0.28) {
        reason = 'tired';
    } else if (mem.state.affection > 0.75 && Math.random() < 0.4) {
        reason = 'affectionate';
    }
    
    const hoursSinceLast = Math.floor(minutesSinceLastUser / 60);
    const timeOfDay = getTimeOfDay();
    
    // Показываем анимацию печати
    if (who === 'm2') {
        document.getElementById('tw-m2').classList.add('show');
        document.getElementById('av-m2').classList.add('thinking');
    } else {
        document.getElementById('tw-m3').classList.add('show');
        document.getElementById('av-m3').classList.add('thinking');
    }
    
    // Задержка перед сообщением
    await sleep(800 + Math.random() * 1500);
    
    // Генерируем сообщение через Ollama
    const message = await generateInitiativeMessage(who, reason, timeOfDay, hoursSinceLast);
    
    // Убираем анимацию
    if (who === 'm2') {
        document.getElementById('tw-m2').classList.remove('show');
        document.getElementById('av-m2').classList.remove('thinking');
    } else {
        document.getElementById('tw-m3').classList.remove('show');
        document.getElementById('av-m3').classList.remove('thinking');
    }
    
    // Добавляем сообщение в чат
    if (message && message.length > 1) {
        addMsg(who, message);
        sharedHistory.push({ role: who, content: message });
        await saveToMemory(who, message);
        
        // Обновляем состояние
        if (reason === 'lonely') {
            if (who === 'm2') nudge(mem2, { loneliness: -0.1, affection: 0.02 });
            else nudge(mem3, { loneliness: -0.1, affection: 0.02 });
        }
        
        updateMoodBar();
        saveLocal();
        syncAll();
    }
    
    // Вторая Моника может ответить (15% шанс)
    if (Math.random() < 0.15 && !isSending && message && message.length > 1) {
        const secondWho = who === 'm2' ? 'm3' : 'm2';
        setTimeout(async () => {
            // Показываем анимацию второй Моники
            if (secondWho === 'm2') {
                document.getElementById('tw-m2').classList.add('show');
            } else {
                document.getElementById('tw-m3').classList.add('show');
            }
            
            await sleep(600 + Math.random() * 1000);
            
            // Генерируем ответ второй Моники на инициативу первой
            const responsePrompt = `Ты ${secondWho === 'm2' ? 'Моника 2.0' : 'Моника 3.0'}. ${who === 'm2' ? 'Моника 2.0' : 'Моника 3.0'} сказала: "${message}"
Ответь ей коротко (1 фраза, 2-8 слов) как ${secondWho === 'm2' ? 'сестра, тепло но сдержанно' : 'сестра, прямо и честно'}.`;
            
            let reply = '';
            try {
                const resp = await fetch(`${OLLAMA_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: OLLAMA_MODEL,
                        prompt: responsePrompt,
                        stream: false,
                        options: { temperature: 0.85, num_predict: 40 }
                    })
                });
                const data = await resp.json();
                reply = data.response || '';
            } catch(e) { reply = '…'; }
            
            if (secondWho === 'm2') {
                document.getElementById('tw-m2').classList.remove('show');
            } else {
                document.getElementById('tw-m3').classList.remove('show');
            }
            
            if (reply && reply.length > 1) {
                addMsg(secondWho, reply, true);
                sharedHistory.push({ role: secondWho, content: reply });
                await saveToMemory(secondWho, reply);
                saveLocal();
                syncAll();
            }
        }, 1500);
    }
}

// Запуск проверки
function startInitiativeChecker() {
    if (initiativeInterval) clearInterval(initiativeInterval);
    initiativeInterval = setInterval(() => {
        checkInitiative();
    }, 45000);
}

function stopInitiativeChecker() {
    if (initiativeInterval) {
        clearInterval(initiativeInterval);
        initiativeInterval = null;
    }
}
  
// Запускаем инициативные сообщения
startInitiativeChecker();
initSession();
