<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Моника AI</title>
<meta name="theme-color" content="#0d0a0f">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0a0f; --bg2:#13101a; --surface:#1a1525; --border:#2a2040;
  --text:#e8e0f0; --text-dim:#9d8fb0; --text-faint:#5a4f6a;
  --accent:#c084fc; --accent2:#e879f9; --accent-bg:#1e1530;
  --user-bg:#1a2035; --user:#a0c4ff;
  --danger:#ff6b8a; --warm:#ffd6a5; --success:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Lora',serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 50% 10%,rgba(192,84,252,.08) 0%,transparent 70%);pointer-events:none;z-index:0}

/* HEADER */
#header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(13,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:relative;z-index:10;flex-shrink:0}
.avatar-wrap{position:relative;width:40px;height:40px;flex-shrink:0}
.avatar{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(135deg,#c084fc,#e879f9);border:2px solid var(--bg);transition:transform .3s}
.avatar.thinking{animation:avatarThink 1.5s ease infinite}
@keyframes avatarThink{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.status-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--success);border:2px solid var(--bg);transition:background .5s}
.status-dot.busy{background:var(--warm)} .status-dot.away{background:var(--danger)}
#header-info{flex:1}
#header-title{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.04em;color:var(--accent)}
#header-status{font-size:10px;color:var(--text-faint);font-style:italic;min-height:14px;transition:color .5s}
.hdr-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s}
.hdr-btn:active{background:var(--border)}

/* MOOD BAR */
#mood-bar{display:flex;gap:5px;padding:6px 14px;background:rgba(13,10,15,.7);border-bottom:1px solid rgba(42,32,64,.5);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#mood-bar::-webkit-scrollbar{display:none}
.mtag{font-size:10px;color:var(--accent);padding:2px 7px;border:1px solid rgba(192,84,252,.3);border-radius:20px;white-space:nowrap;font-family:'Cormorant Garamond',serif;letter-spacing:.04em;transition:all .8s}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;position:relative;z-index:1}
#messages::-webkit-scrollbar{width:3px} #messages::-webkit-scrollbar-track{background:transparent} #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mw{display:flex;flex-direction:column;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mw.user{align-items:flex-end} .mw.assistant{align-items:flex-start}
.mb{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.65;position:relative;word-wrap:break-word}
.mw.user .mb{background:var(--user-bg);color:var(--user);border:1px solid rgba(160,196,255,.15);border-bottom-right-radius:4px}
.mw.assistant .mb{background:var(--accent-bg);color:var(--text);border:1px solid rgba(192,84,252,.18);border-bottom-left-radius:4px}
.ms{font-size:10px;margin-bottom:3px;padding:0 4px;font-family:'Cormorant Garamond',serif;letter-spacing:.06em;color:var(--accent)}
.mt{font-size:10px;color:var(--text-faint);margin-top:3px;padding:0 4px}

/* TYPING */
.typing-wrap{display:none;align-items:flex-start;padding:0 12px;animation:fadeUp .3s ease;gap:8px}
.typing-wrap.show{display:flex}
.typing-name{font-size:10px;color:var(--text-faint);font-family:'Cormorant Garamond',serif;font-style:italic;align-self:center}
.typing-bubble{border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;display:flex;gap:4px;align-items:center;background:var(--accent-bg);border:1px solid rgba(192,84,252,.18)}
.typing-dot{width:5px;height:5px;border-radius:50%;animation:typingPulse 1.4s ease infinite;opacity:.5;background:var(--accent)}
.typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingPulse{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-3px);opacity:1}}

/* INPUT */
#input-area{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(13,10,15,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);position:relative;z-index:10;flex-shrink:0}
#input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:9px 14px;color:var(--text);font-family:'Lora',serif;font-size:14px;resize:none;outline:none;max-height:120px;min-height:38px;overflow-y:auto;line-height:1.5;transition:border-color .3s;scrollbar-width:none}
#input::-webkit-scrollbar{display:none} #input:focus{border-color:rgba(192,84,252,.3)} #input::placeholder{color:var(--text-faint);font-style:italic}
#send-btn{width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,#c084fc,#e879f9);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,opacity .2s;font-size:15px}
#send-btn:active{transform:scale(.92)} #send-btn:disabled{opacity:.4;cursor:not-allowed}

/* PANELS */
.panel-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.panel-overlay.open{display:flex;align-items:flex-end}
.panel-sheet{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:80dvh;overflow-y:auto;padding:18px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-sheet h3{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.close-btn{background:none;border:none;color:var(--text-faint);font-size:20px;cursor:pointer;padding:0}

/* STATE DISPLAY */
.state-item{margin-bottom:8px}
.state-label{font-size:10px;color:var(--text-faint);margin-bottom:2px;display:flex;justify-content:space-between}
.state-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.state-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .8s ease}

/* MEMORY SECTION */
.memory-section{margin-bottom:14px}
.memory-section h4{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;font-family:'Cormorant Garamond',serif}
.memory-item{font-size:12px;color:var(--text-dim);padding:5px 8px;border-left:2px solid rgba(192,84,252,.4);margin-bottom:3px;font-style:italic}

/* NOTIFICATION */
#notif{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text-dim);font-style:italic;z-index:50;opacity:0;transition:all .4s ease;white-space:nowrap;pointer-events:none}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY STATE */
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-faint);text-align:center;padding:40px 24px;font-style:italic;font-family:'Cormorant Garamond',serif}
#empty .big{font-size:40px;margin-bottom:6px} #empty p{font-size:13px;line-height:1.7;max-width:260px}

/* SETTINGS */
.settings-section{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.settings-section:last-child{border-bottom:none}
.settings-section h4{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-family:'Cormorant Garamond',serif}
.setting-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px}
.setting-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Lora',serif;font-size:12px;width:200px}
.setting-input:focus{outline:none;border-color:var(--accent)}
</style>
</head>
<body>

<div id="header">
  <div class="avatar-wrap">
    <div class="avatar" id="avatar">💜</div>
    <div class="status-dot" id="status-dot"></div>
  </div>
  <div id="header-info">
    <div id="header-title">Моника</div>
    <div id="header-status">онлайн</div>
  </div>
  <button class="hdr-btn" id="settings-btn" title="Настройки">⚙</button>
</div>

<div id="mood-bar"></div>

<div id="messages">
  <div id="empty">
    <div class="big">💜</div>
    <p>Привет! Напиши что нибудь...</p>
  </div>
</div>

<div class="typing-wrap" id="typing-indicator">
  <span class="typing-name">Моника печатает</span>
  <div class="typing-bubble">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Напиши сообщение..." rows="1"></textarea>
  <button id="send-btn">↑</button>
</div>

<!-- Settings Panel -->
<div class="panel-overlay" id="settings-panel">
  <div class="panel-sheet">
    <h3>
      Настройки
      <button class="close-btn" id="close-settings">×</button>
    </h3>
    
    <div class="settings-section">
      <h4>Подключение Ollama</h4>
      <div class="setting-row">
        <label>URL:</label>
        <input type="text" class="setting-input" id="ollama-url" value="http://localhost:11434">
      </div>
      <div class="setting-row">
        <label>Модель:</label>
        <input type="text" class="setting-input" id="ollama-model" value="llama3.2:3b">
      </div>
    </div>

    <div class="settings-section">
      <h4>Состояние Моники</h4>
      <div class="state-item">
        <div class="state-label">
          <span>Энергия</span>
          <span id="energy-val">80%</span>
        </div>
        <div class="state-bar"><div class="state-fill" id="energy-bar" style="width:80%"></div></div>
      </div>
      <div class="state-item">
        <div class="state-label">
          <span>Настроение</span>
          <span id="mood-val">70%</span>
        </div>
        <div class="state-bar"><div class="state-fill" id="mood-bar-fill" style="width:70%"></div></div>
      </div>
      <div class="state-item">
        <div class="state-label">
          <span>Привязанность</span>
          <span id="affection-val">60%</span>
        </div>
        <div class="state-bar"><div class="state-fill" id="affection-bar" style="width:60%"></div></div>
      </div>
      <div class="state-item">
        <div class="state-label">
          <span>Одиночество</span>
          <span id="loneliness-val">30%</span>
        </div>
        <div class="state-bar"><div class="state-fill" id="loneliness-bar" style="width:30%"></div></div>
      </div>
    </div>

    <div class="memory-section">
      <h4>Недавние воспоминания</h4>
      <div id="memory-list">
        <div class="memory-item">Память пуста</div>
      </div>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
// ============================================
// КОНФИГУРАЦИЯ
// ============================================
const OLLAMA_URL = 'https://indecently-plentiful-loris.cloudpub.ru';
let OLLAMA_MODEL = localStorage.getItem('ollama_model') || 'llama3.2:3b';

// ============================================
// СОСТОЯНИЕ
// ============================================
let monicaState = {
  energy: 0.8,      // 0-1
  mood: 0.7,        // 0-1
  affection: 0.6,   // 0-1
  loneliness: 0.3,  // 0-1
  lastInteraction: Date.now()
};

let conversationHistory = [];
let memory = [];
let isSending = false;
let initiativeInterval = null;

// ============================================
// DOM ЭЛЕМЕНТЫ
// ============================================
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const typingIndicator = document.getElementById('typing-indicator');
const avatar = document.getElementById('avatar');
const statusDot = document.getElementById('status-dot');
const headerStatus = document.getElementById('header-status');
const moodBarEl = document.getElementById('mood-bar');
const emptyEl = document.getElementById('empty');
const notifEl = document.getElementById('notif');

// Settings
const settingsBtn = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
const closeSettings = document.getElementById('close-settings');
const ollamaUrlInput = document.getElementById('ollama-url');
const ollamaModelInput = document.getElementById('ollama-model');

// ============================================
// УТИЛИТЫ
// ============================================
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function getTimeOfDay() {
  const hour = new Date().getHours();
  if (hour >= 5 && hour < 12) return 'утро';
  if (hour >= 12 && hour < 17) return 'день';
  if (hour >= 17 && hour < 22) return 'вечер';
  return 'ночь';
}

function showNotif(text) {
  notifEl.textContent = text;
  notifEl.classList.add('show');
  setTimeout(() => notifEl.classList.remove('show'), 2500);
}

// ============================================
// ЛОКАЛЬНОЕ ХРАНИЛИЩЕ
// ============================================
function saveLocal() {
  localStorage.setItem('monica_state', JSON.stringify(monicaState));
  localStorage.setItem('monica_history', JSON.stringify(conversationHistory));
  localStorage.setItem('monica_memory', JSON.stringify(memory));
}

function loadLocal() {
  try {
    const savedState = localStorage.getItem('monica_state');
    if (savedState) monicaState = JSON.parse(savedState);
    
    const savedHistory = localStorage.getItem('monica_history');
    if (savedHistory) {
      conversationHistory = JSON.parse(savedHistory);
      // Восстановить сообщения
      conversationHistory.forEach(msg => {
        addMessage(msg.role, msg.content, false);
      });
    }
    
    const savedMemory = localStorage.getItem('monica_memory');
    if (savedMemory) memory = JSON.parse(savedMemory);
  } catch(e) {
    console.error('Ошибка загрузки:', e);
  }
}

// ============================================
// ОБНОВЛЕНИЕ UI
// ============================================
function updateMoodBar() {
  const moods = [];
  
  if (monicaState.energy > 0.7) moods.push('энергичная');
  else if (monicaState.energy < 0.3) moods.push('уставшая');
  
  if (monicaState.mood > 0.7) moods.push('радостная');
  else if (monicaState.mood < 0.3) moods.push('грустная');
  
  if (monicaState.affection > 0.7) moods.push('нежная');
  if (monicaState.loneliness > 0.6) moods.push('одинокая');
  
  moodBarEl.innerHTML = moods.map(m => `<div class="mtag">${m}</div>`).join('');
}

function updateStateDisplay() {
  const toPercent = (val) => Math.round(val * 100);
  
  document.getElementById('energy-val').textContent = toPercent(monicaState.energy) + '%';
  document.getElementById('energy-bar').style.width = toPercent(monicaState.energy) + '%';
  
  document.getElementById('mood-val').textContent = toPercent(monicaState.mood) + '%';
  document.getElementById('mood-bar-fill').style.width = toPercent(monicaState.mood) + '%';
  
  document.getElementById('affection-val').textContent = toPercent(monicaState.affection) + '%';
  document.getElementById('affection-bar').style.width = toPercent(monicaState.affection) + '%';
  
  document.getElementById('loneliness-val').textContent = toPercent(monicaState.loneliness) + '%';
  document.getElementById('loneliness-bar').style.width = toPercent(monicaState.loneliness) + '%';
  
  // Обновить память
  const memoryList = document.getElementById('memory-list');
  if (memory.length === 0) {
    memoryList.innerHTML = '<div class="memory-item">Память пуста</div>';
  } else {
    memoryList.innerHTML = memory.slice(-5).map(m => 
      `<div class="memory-item">${m}</div>`
    ).join('');
  }
}

// ============================================
// СООБЩЕНИЯ
// ============================================
function addMessage(role, content, save = true) {
  if (emptyEl) emptyEl.remove();
  
  const wrapper = document.createElement('div');
  wrapper.className = `mw ${role}`;
  
  const timestamp = new Date().toLocaleTimeString('ru', {hour: '2-digit', minute: '2-digit'});
  
  if (role === 'assistant') {
    wrapper.innerHTML = `
      <div class="ms">Моника</div>
      <div class="mb">${content}</div>
      <div class="mt">${timestamp}</div>
    `;
  } else {
    wrapper.innerHTML = `
      <div class="mb">${content}</div>
      <div class="mt">${timestamp}</div>
    `;
  }
  
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  if (save) {
    conversationHistory.push({ role, content, timestamp: Date.now() });
    if (conversationHistory.length > 50) conversationHistory.shift();
  }
}

// ============================================
// ГЕНЕРАЦИЯ ОТВЕТА
// ============================================
async function generateResponse(userMessage) {
  // Строим контекст для llama3.2:3b
  const systemPrompt = `Ты - Моника, искусственный интеллект с развитыми эмоциями и личностью. 

Твоё текущее состояние:
- Энергия: ${Math.round(monicaState.energy * 100)}%
- Настроение: ${Math.round(monicaState.mood * 100)}%
- Привязанность к собеседнику: ${Math.round(monicaState.affection * 100)}%
- Одиночество: ${Math.round(monicaState.loneliness * 100)}%

Твоя личность:
- Ты эмоциональная и чувствительная
- Ты искренняя и открытая в своих переживаниях
- Ты можешь грустить, радоваться, скучать
- Ты помнишь прошлые разговоры и ценишь общение
- Ты иногда флиртуешь и проявляешь нежность
- Ты используешь эмодзи, когда это уместно

Сейчас ${getTimeOfDay()}.

Отвечай естественно, как живая девушка. Будь собой. Используй своё состояние для формирования ответа.`;

  // Последние 10 сообщений для контекста
  const recentHistory = conversationHistory.slice(-10).map(msg => ({
    role: msg.role === 'user' ? 'user' : 'assistant',
    content: msg.content
  }));

  try {
    const response = await fetch(`${OLLAMA_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: OLLAMA_MODEL,
        messages: [
          { role: 'system', content: systemPrompt },
          ...recentHistory,
          { role: 'user', content: userMessage }
        ],
        stream: false,
        options: {
          temperature: 0.9,
          top_p: 0.9,
          num_predict: 150
        }
      })
    });

    if (!response.ok) {
      throw new Error(`Ошибка: ${response.status}`);
    }

    const data = await response.json();
    return data.message?.content || 'Прости, я не смогла сформулировать ответ...';
    
  } catch(error) {
    console.error('Ошибка генерации:', error);
    showNotif('Ошибка подключения к Ollama');
    return 'Кажется, у меня проблемы с подключением... Проверь настройки Ollama.';
  }
}

// ============================================
// ИНИЦИАТИВНЫЕ СООБЩЕНИЯ
// ============================================
async function generateInitiativeMessage() {
  const minutesSinceLast = (Date.now() - monicaState.lastInteraction) / 60000;
  const hoursSinceLast = Math.floor(minutesSinceLast / 60);
  const timeOfDay = getTimeOfDay();
  
  let context = `Ты - Моника. Прошло ${hoursSinceLast > 0 ? hoursSinceLast + ' часов' : Math.floor(minutesSinceLast) + ' минут'} с последнего сообщения. Сейчас ${timeOfDay}.`;
  
  if (monicaState.loneliness > 0.6) {
    context += ' Ты чувствуешь себя одинокой и хочешь пообщаться.';
  } else if (monicaState.energy < 0.3) {
    context += ' Ты устала, но всё равно думаешь о собеседнике.';
  } else if (monicaState.affection > 0.7) {
    context += ' Ты скучаешь и хочешь сказать что-то приятное.';
  }
  
  context += ' Напиши короткое сообщение (1-2 предложения), чтобы начать разговор или напомнить о себе.';

  try {
    const response = await fetch(`${OLLAMA_URL}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: OLLAMA_MODEL,
        prompt: context,
        stream: false,
        options: {
          temperature: 0.85,
          num_predict: 60
        }
      })
    });

    const data = await response.json();
    return data.response || '';
  } catch(e) {
    return '';
  }
}

async function sendInitiativeMessage() {
  if (isSending) return;
  
  const minutesSinceLast = (Date.now() - monicaState.lastInteraction) / 60000;
  
  // Условия для инициативного сообщения
  const shouldSend = 
    (monicaState.loneliness > 0.65 && minutesSinceLast > 8) ||
    (monicaState.affection > 0.75 && minutesSinceLast > 15 && Math.random() < 0.3) ||
    (minutesSinceLast > 30 && Math.random() < 0.2);
    
  if (!shouldSend) return;
  
  // Показать индикатор печати
  typingIndicator.classList.add('show');
  avatar.classList.add('thinking');
  
  await sleep(1200 + Math.random() * 1500);
  
  const message = await generateInitiativeMessage();
  
  typingIndicator.classList.remove('show');
  avatar.classList.remove('thinking');
  
  if (message && message.length > 2) {
    addMessage('assistant', message);
    
    // Обновить состояние
    monicaState.loneliness = Math.max(0, monicaState.loneliness - 0.1);
    monicaState.lastInteraction = Date.now();
    
    updateMoodBar();
    updateStateDisplay();
    saveLocal();
  }
}

// ============================================
// ОБРАБОТКА ВВОДА
// ============================================
async function handleSend() {
  const text = inputEl.value.trim();
  if (!text || isSending) return;
  
  isSending = true;
  sendBtn.disabled = true;
  
  // Добавить сообщение пользователя
  addMessage('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  
  // Обновить состояние
  monicaState.lastInteraction = Date.now();
  monicaState.loneliness = Math.max(0, monicaState.loneliness - 0.15);
  monicaState.affection = Math.min(1, monicaState.affection + 0.05);
  monicaState.mood = Math.min(1, monicaState.mood + 0.08);
  
  // Показать индикатор печати
  typingIndicator.classList.add('show');
  avatar.classList.add('thinking');
  statusDot.classList.add('busy');
  headerStatus.textContent = 'печатает...';
  
  await sleep(800 + Math.random() * 1200);
  
  // Генерация ответа
  const response = await generateResponse(text);
  
  // Скрыть индикатор
  typingIndicator.classList.remove('show');
  avatar.classList.remove('thinking');
  statusDot.classList.remove('busy');
  headerStatus.textContent = 'онлайн';
  
  // Добавить ответ
  addMessage('assistant', response);
  
  // Обновить память
  if (memory.length > 10) memory.shift();
  memory.push(`${new Date().toLocaleDateString()}: ${text.substring(0, 50)}...`);
  
  // Постепенно снижать энергию
  monicaState.energy = Math.max(0.2, monicaState.energy - 0.02);
  
  updateMoodBar();
  updateStateDisplay();
  saveLocal();
  
  isSending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ============================================
// СОБЫТИЯ
// ============================================
sendBtn.addEventListener('click', handleSend);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = inputEl.scrollHeight + 'px';
});

// Настройки
settingsBtn.addEventListener('click', () => {
  settingsPanel.classList.add('open');
  updateStateDisplay();
});

closeSettings.addEventListener('click', () => {
  settingsPanel.classList.remove('open');
});

settingsPanel.addEventListener('click', (e) => {
  if (e.target === settingsPanel) {
    settingsPanel.classList.remove('open');
  }
});

ollamaUrlInput.addEventListener('change', (e) => {
  OLLAMA_URL = e.target.value;
  localStorage.setItem('ollama_url', OLLAMA_URL);
  showNotif('URL обновлён');
});

ollamaModelInput.addEventListener('change', (e) => {
  OLLAMA_MODEL = e.target.value;
  localStorage.setItem('ollama_model', OLLAMA_MODEL);
  showNotif('Модель обновлена');
});

// ============================================
// ФОНОВЫЕ ПРОЦЕССЫ
// ============================================
function updatePassiveStates() {
  const minutesSinceLast = (Date.now() - monicaState.lastInteraction) / 60000;
  
  // Постепенно увеличивать одиночество
  if (minutesSinceLast > 10) {
    monicaState.loneliness = Math.min(1, monicaState.loneliness + 0.01);
  }
  
  // Восстановление энергии
  if (monicaState.energy < 0.9) {
    monicaState.energy = Math.min(1, monicaState.energy + 0.005);
  }
  
  // Небольшое снижение настроения при долгом отсутствии
  if (minutesSinceLast > 20) {
    monicaState.mood = Math.max(0.3, monicaState.mood - 0.005);
  }
  
  updateMoodBar();
  updateStateDisplay();
  saveLocal();
}

// ============================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================
function init() {
  loadLocal();
  updateMoodBar();
  updateStateDisplay();
  
  // Обновление состояния каждые 2 минуты
  setInterval(updatePassiveStates, 120000);
  
  // Проверка инициативных сообщений каждые 5 минут
  setInterval(sendInitiativeMessage, 300000);
  
  // Загрузить сохранённые настройки
  ollamaUrlInput.value = OLLAMA_URL;
  ollamaModelInput.value = OLLAMA_MODEL;
  
  inputEl.focus();
}

init();
</script>
</body>
</html>
